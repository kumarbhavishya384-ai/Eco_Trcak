services:
  - type: web
    name: ecotrack-ai
    env: python
    buildCommand: "pip install -r backend_py/requirements.txt"
    startCommand: "gunicorn --chdir backend_py app:app --bind 0.0.0.0:$PORT"
    envVars:
      - key: PORT
        value: 5050
      - key: PYTHON_VERSION
        value: 3.10.0
      # Make sure to copy other environment variables from your .env file here 
      # (e.g., MONGO_URI, JWT_SECRET, GOOGLE_API_KEY, SMTP_PASS, etc.)
