<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile Settings – EcoTrack AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@500;700;900&display=swap" rel="stylesheet" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌿</text></svg>">
    <link rel="stylesheet" href="css/style.css" />
    <meta name="theme-color" content="#22c55e">
    <style>
        .profile-container {
            max-width: 800px;
            margin: 2rem auto;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 20px;
            padding: 2.5rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
        }
        .profile-header {
            display: flex;
            align-items: center;
            gap: 2.5rem;
            margin-bottom: 2.5rem;
            padding-bottom: 2.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .avatar-upload-wrapper {
            position: relative;
        }
        .avatar-upload-container {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 2px dashed rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .avatar-upload-container:hover {
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.2);
        }
        .avatar-upload-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }
        .avatar-placeholder {
            font-size: 3rem;
            color: var(--text-muted);
            transition: color 0.3s ease;
        }
        .avatar-upload-container:hover .avatar-placeholder {
            color: var(--primary);
        }
        .upload-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            text-align: center;
            padding: 0.6rem 0;
            font-size: 0.85rem;
            transform: translateY(100%);
            transition: transform 0.3s ease;
            backdrop-filter: blur(4px);
        }
        .avatar-upload-container:hover .upload-overlay {
            transform: translateY(0);
        }
        #profilePicInput {
            display: none;
        }
        .profile-info-header h2 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2rem;
            margin-bottom: 0.5rem;
            color: #fff;
        }
        .profile-info-header p {
            color: var(--text-secondary);
            font-size: 1rem;
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .form-group.full-width {
            grid-column: 1 / -1;
        }
        .form-group label {
            font-size: 0.9rem;
            color: var(--text-secondary);
            font-weight: 500;
        }
        .form-group input {
            padding: 0.8rem 1rem;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(34, 197, 94, 0.05);
        }
        .form-group input:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-save {
            background: var(--primary);
            color: #000;
            border: none;
            padding: 1rem 2rem;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            width: 100%;
            margin-top: 2rem;
            transition: all 0.3s ease;
        }
        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(34, 197, 94, 0.3);
            background: #22c55e;
        }
        .btn-save:active {
            transform: translateY(0);
        }
    </style>
</head>
<body class="app-body">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo">
            <span style="filter: drop-shadow(0 0 8px var(--primary));">🌿</span>
            <span class="logo-text">EcoTrack <b>AI</b></span>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item" id="nav-dashboard">
                <span class="nav-icon">📊</span><span class="nav-label">Dashboard</span>
            </a>
            <a href="report.html" class="nav-item" id="nav-report">
                <span class="nav-icon">📜</span><span class="nav-label">Reports</span>
            </a>
            <a href="calculator.html" class="nav-item" id="nav-calculator">
                <span class="nav-icon">🧮</span><span class="nav-label">Calculator</span>
            </a>
            <a href="history.html" class="nav-item" id="nav-history">
                <span class="nav-icon">📅</span><span class="nav-label">History</span>
            </a>
            <a href="recommendations.html" class="nav-item" id="nav-recommendations">
                <span class="nav-icon">💡</span><span class="nav-label">AI Insights</span>
            </a>
            <a href="leaderboard.html" class="nav-item" id="nav-leaderboard">
                <span class="nav-icon">🏆</span><span class="nav-label">Leaderboard</span>
            </a>
        </nav>
        <div class="sidebar-footer">
            <div class="user-mini-profile" id="userMiniProfile">
                <div class="user-avatar" id="sidebarAvatar">A</div>
                <div class="user-info">
                    <div class="user-name" id="sidebarName">Loading...</div>
                    <div class="user-score-badge" id="sidebarScore">EcoScore: --</div>
                </div>
            </div>
            <button class="logout-btn" onclick="logout()">⬡ Logout</button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <header class="topbar">
            <div class="topbar-left">
                <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
                <h1 class="page-title">Profile Settings</h1>
            </div>
            <div class="topbar-right">
                <div class="profile-dropdown-container" style="position:relative; margin-left: 8px;">
                    <div class="user-avatar" id="topNavAvatar" style="cursor:pointer; border: 2px solid var(--primary);" onclick="document.getElementById('profileDropdown').classList.toggle('active')">A</div>
                    <div class="dropdown-menu" id="profileDropdown" style="position:absolute; top: 100%; right: 0; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 12px; padding: 0.5rem; margin-top: 0.5rem; display: none; min-width: 150px; box-shadow: var(--shadow-card); z-index: 1000;">
                        <a href="profile.html" style="display:block; padding: 0.5rem 1rem; color: #fff; text-decoration: none; font-size: 0.85rem; border-radius: 8px; background:rgba(255,255,255,0.05);">Profile Settings</a>
                        <button onclick="logout()" style="width: 100%; text-align: left; background: transparent; border: none; padding: 0.5rem 1rem; color: var(--danger); cursor: pointer; font-size: 0.85rem; border-radius: 8px;" onmouseover="this.style.background='rgba(239, 68, 68, 0.1)'" onmouseout="this.style.background='transparent'">Logout</button>
                    </div>
                </div>
                <style>
                    .dropdown-menu.active { display: block !important; animation: fadeInDown 0.2s ease-out; }
                </style>
            </div>
        </header>

        <div class="profile-container reveal">
            <div class="profile-header">
                <div class="avatar-upload-wrapper">
                    <label for="profilePicInput" class="avatar-upload-container" id="avatarPreviewContainer">
                        <span class="avatar-placeholder" id="avatarPlaceholderInitial">👤</span>
                        <img id="avatarPreviewImage" src="" alt="Profile Picture" />
                        <div class="upload-overlay">Change Image</div>
                    </label>
                    <input type="file" id="profilePicInput" accept="image/*" />
                </div>
                <div class="profile-info-header">
                    <h2 id="profileDisplayName">User Name</h2>
                    <p id="profileEmailDisplay">user@example.com</p>
                    <div class="score-level-badge" style="background: rgba(0, 212, 170, 0.1); color: var(--primary); margin-top: 0.5rem; display: inline-flex; padding: 0.4rem 1rem;">
                        <span>🌱</span> <span style="margin-left:8px;" id="profileEcoScoreDisplay">EcoScore: 0</span>
                    </div>
                </div>
            </div>

            <form id="profileForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="firstName">First Name</label>
                        <input type="text" id="firstName" name="firstName" required placeholder="Enter first name" />
                    </div>
                    <div class="form-group">
                        <label for="lastName">Last Name</label>
                        <input type="text" id="lastName" name="lastName" placeholder="Enter last name" />
                    </div>
                    <div class="form-group full-width">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" disabled title="Email cannot be changed" />
                    </div>
                    <div class="form-group full-width">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" name="phone" placeholder="Enter your phone number" />
                    </div>
                </div>
                <button type="submit" class="btn-save" id="saveProfileBtn">Save Changes</button>
            </form>
        </div>
    </main>

    <!-- Scripts -->
    <script src="js/app.js"></script>
    <script src="js/profile.js"></script>
    <script>
        document.addEventListener('click', (e) => {
            const dropdown = document.getElementById('profileDropdown');
            const avatar = document.getElementById('topNavAvatar');
            if (dropdown && avatar && !avatar.contains(e.target) && !dropdown.contains(e.target)) {
                dropdown.classList.remove('active');
            }
        });
        
        // Inline observer for reveal
        const dashObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                    dashObserver.unobserve(entry.target);
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.reveal').forEach(el => dashObserver.observe(el));
    </script>
</body>
</html>
